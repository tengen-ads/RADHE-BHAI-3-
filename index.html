<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP CHANNEL</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#000;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:420px;
}

.card{
    background:#080808;
    border:1px solid #3a2d00;
    border-radius:30px;
    padding:30px 20px;
    text-align:center;
    box-shadow:0 0 40px rgba(255,215,0,.25);
}

.title{
    color:#ffd700;
    font-size:42px;
    font-weight:bold;
    margin-bottom:25px;
}

.profile{
    width:170px;
    height:170px;
    border-radius:50%;
    margin:auto;
    overflow:hidden;
    border:5px solid #ffd700;
    box-shadow:0 0 35px #ffd700;
}

.profile img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.live-text{
    margin-top:30px;
    color:#00ff99;
    font-size:24px;
    font-weight:800;
}

.timer{
    font-size:70px;
    font-weight:bold;
    margin-top:20px;
}

.live-users{
    width:max-content;
    margin:25px auto 0;
    padding:14px 25px;
    border-radius:20px;
    background:#111;
    font-size:24px;
}

.red-dot{
    color:red;
}

.btn{
    width:100%;
    padding:22px;
    margin-top:20px;
    border-radius:18px;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
}

.join{
    background:#ffd700;
    color:#000;
    border:none;
}

.claim{
    background:transparent;
    color:#ffd700;
    border:3px solid #ffd700;
}
</style>
</head>

<body>

<div class="container">

    <div class="card">

        <div class="title">
           𝐑𝐀𝐃𝐇𝐄 𝐗 𝐄𝐌𝐏𝐈𝐑𝐄 🥷
        </div>

        <div class="profile">
            <img src="https://www.image2url.com/r2/default/images/1780159457443-cf78c78d-046d-4c57-86fd-dda6f94572b0.png" alt="">
        </div>

        <div class="live-text">
            ⚡ LIVE NUMBER PREDICTION
        </div>

        <div class="timer" id="timer">
            00:3
        </div>

        <div class="live-users">
            <span class="red-dot">🔴</span>
            LIVE • 535 USERS
        </div>

    </div>

    <button class="btn join">
        JOIN VIP NOW
    </button>

    <button class="btn claim">
        CLAIM
    </button>

</div>

<script>
let count = 3;
const timer = document.getElementById("timer");

setInterval(()=>{
    count--;
    if(count < 0) count = 3;
    timer.innerText = "00:" + count;
},1000);
</script>

</body>
</html>
